---
- name: Check existence of qBittorrent systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ qbittorrent_identifier }}.service"
  register: qbittorrent_service_stat

- name: Uninstall qBittorrent systemd services and files
  when: qbittorrent_service_stat.stat.exists | bool
  block:
    - name: Ensure qBittorrent systemd service is stopped
      ansible.builtin.service:
        name: "{{ qbittorrent_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure qBittorrent systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ qbittorrent_identifier }}.service"
        state: absent

    - name: Ensure qBittorrent support files do not exist
      ansible.builtin.file:
        path: "{{ qbittorrent_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure qBittorrent local data path if empty
      ansible.builtin.command:
        cmd: "rmdir {{ qbittorrent_data_path }}"
      register: qbittorrent_data_path_deletion_result
      changed_when: qbittorrent_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure qBittorrent local download data path if empty
      ansible.builtin.command:
        cmd: "rmdir {{ qbittorrent_download_path }}"
      register: qbittorrent_download_path_deletion_result
      changed_when: qbittorrent_download_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure qBittorrent base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ qbittorrent_base_path }}"
      register: qbittorrent_base_path_deletion_result
      changed_when: qbittorrent_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure qBittorrent container network does not exist
      when: qbittorrent_container_network_deletion_enabled
      block:
        - name: Ensure qBittorrent container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ qbittorrent_container_network }}"
            state: absent
          register: qbittorrent_network_deletion_result

        - name: Ensure qBittorrent container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ qbittorrent_container_network }}
          register: qbittorrent_network_deletion_result
          changed_when: qbittorrent_container_network in qbittorrent_network_deletion_result.stdout

- name: Check existence of qBittorrent local data path
  ansible.builtin.stat:
    path: "{{ qbittorrent_data_path }}"
  register: qbittorrent_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining qBittorrent local data path
  when: qbittorrent_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local qBittorrent instance has been removed, local data remains in `" + qbittorrent_data_path + "`. Feel free to delete it."
        ]
      }}

- name: Check existence of qBittorrent local download data path
  ansible.builtin.stat:
    path: "{{ qbittorrent_download_path }}"
  register: qbittorrent_download_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining qBittorrent local download data path
  when: qbittorrent_download_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local qBittorrent instance has been removed, local data remains in `" + qbittorrent_download_path + "`. Feel free to delete it."
        ]
      }}
