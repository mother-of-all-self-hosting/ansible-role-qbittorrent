---
- name: Ensure qBittorrent paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
  with_items:
    - "{{ qbittorrent_base_path }}"
    - "{{ qbittorrent_data_path }}"
    - "{{ qbittorrent_download_path }}"

- name: Ensure qBittorrent support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ qbittorrent_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ qbittorrent_uid }}"
    group: "{{ qbittorrent_gid }}"
  with_items:
    - env
    - labels
  register: qbittorrent_support_files_result

- name: Ensure qBittorrent container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ qbittorrent_container_image }}"
    pull: always
  register: qbittorrent_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: qbittorrent_container_image_pull_result_ansible_module is not failed

- name: Ensure qBittorrent container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ qbittorrent_container_image }}"
  register: qbittorrent_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: qbittorrent_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in qbittorrent_container_image_pull_result_command.stdout"

- name: Ensure qBittorrent container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ qbittorrent_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: qbittorrent_network_creation_result

- name: Ensure qBittorrent container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ qbittorrent_container_network }}
  register: qbittorrent_network_creation_result
  changed_when: qbittorrent_network_creation_result.rc == 0
  failed_when: qbittorrent_network_creation_result.rc != 0 and 'already exists' not in qbittorrent_network_creation_result.stderr

- name: Ensure qBittorrent systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/qbittorrent.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ qbittorrent_identifier }}.service"
    mode: "0644"
  register: qbittorrent_systemd_service_result

- name: Determine whether qBittorrent needs a restart
  ansible.builtin.set_fact:
    qbittorrent_restart_necessary: >-
      {{
        qbittorrent_support_files_result.changed | default(false)
        or qbittorrent_systemd_service_result.changed | default(false)
        or qbittorrent_container_image_pull_result_ansible_module.changed | default(false)
        or qbittorrent_container_image_pull_result_command.changed | default(false)
      }}
